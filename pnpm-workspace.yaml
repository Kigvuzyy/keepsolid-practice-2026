packages:
  - "apps/*"
  - "packages/*"

autoInstallPeers: false
injectWorkspacePackages: true

ignoredBuiltDependencies:
  - "@nestjs/core"
  - protobufjs
  - unrs-resolver

onlyBuiltDependencies:
  - "@prisma/engines"
  - "@swc/core"
  - esbuild
  - prisma

peerDependencyRules:
  allowAny:
    - "*"
  ignoreMissing:
    - "*"

publicHoistPattern:
  - "*eslint*"
  - "*prettier*"

catalogs:
  prisma:
    prisma: 7.1.0
    "@prisma/client": 7.1.0
    "@prisma/client-runtime-utils": 7.1.0
    "@prisma/adapter-pg": 7.1.0
  nest11:
    "@nestjs/common": 11.1.8
    "@nestjs/core": 11.1.8
    "@nestjs/cqrs": 11.0.3
    "@nestjs/platform-express": 11.1.8
    "@nestjs/platform-fastify": 11.1.8
    "@nestjs/microservices": 11.1.8
    "@nestjs/terminus": 11.1.1
    reflect-metadata: 0.2.2
    rxjs: 7.8.2
    tslib: 2.8.1
